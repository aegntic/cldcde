# CLDCDE Cloud Aegnts Plugin
# Cursor-inspired Cloud Aegnts with Computer Use
# (c) 2025 AE.ltd - Research: aegntic.ai - Led by Mattae Cooper

id: cloud-aegnts
name: Cloud Aegnts with Computer Use
version: 1.0.0
author: AE.ltd
contributors:
  - Mattae Cooper (Lead Researcher)
  - aegntic.ai Research Team
description: |
  Run AI aegnts in isolated sandboxes that record themselves interacting
  with software they build. Features automatic video recording, browser
  automation, artifact generation, and merge-ready PRs.

  Inspired by Cursor's Agent Computer Use:
  https://cursor.com/blog/agent-computer-use

category: automation
tags:
  - cloud-aegnts
  - computer-use
  - sandbox
  - video-recording
  - browser-automation
  - artifacts
  - cursor-inspired

platforms:
  - claude-code
  - agent-zero
  - opencode
  - openclaw

minClaudeCodeVersion: 1.0.0

features:
  - id: cloud-agents
    name: Cloud Agents
    description: Run agents in isolated Docker/E2B/VM sandboxes
    commands:
      - /cloud-agent start <task>
      - /cloud-agent parallel <tasks...>
      - /cloud-agent status
      - /cloud-agent stop
      - /cloud-agent pr

  - id: computer-use
    name: Computer Use
    description: Browser and desktop automation for agents
    capabilities:
      - Navigate browsers
      - Click elements
      - Type text
      - Take screenshots
      - Execute terminal commands

  - id: video-recording
    name: Video Recording
    description: Automatic video recording of agent interactions
    outputFormats:
      - mp4
      - webm
      - gif

  - id: artifact-generation
    name: Artifact Generation
    description: Generate videos, screenshots, and logs
    artifactTypes:
      - video
      - screenshot
      - logs
      - diff

  - id: multi-agent
    name: Multi-Agent Parallelism
    description: Run up to 8 agents in parallel
    strategies:
      - race
      - consensus
      - specialized
      - sequential

sandboxTypes:
  - type: docker
    description: Local Docker container
    useCase: Development, testing
  - type: e2b
    description: E2B secure sandbox
    useCase: Production, untrusted code
  - type: vm
    description: Full virtual machine
    useCase: Complex environments
  - type: remote
    description: Remote server
    useCase: Existing infrastructure

hooks:
  preTask:
    file: hooks/auto-agent-hooks.js
    function: preTask
  postTask:
    file: hooks/auto-agent-hooks.js
    function: postTask
  preEdit:
    file: hooks/auto-agent-hooks.js
    function: preEdit
  postEdit:
    file: hooks/auto-agent-hooks.js
    function: postEdit

skills:
  - skills/cloud-agent-skill.yaml
  - skills/auto-agent-skill.yaml
  - skills/auto-demo-skill.yaml

installation:
  npm:
    package: "@aegntic/cldcde-cloud-aegnts"
    global: true
  manual:
    - Copy skills/*.yaml to ~/.claude/skills/
    - Copy hooks/*.js to ~/.claude/hooks/
    - Add to Claude Code settings

configuration:
  sandbox:
    type: docker
    resources:
      cpu: 2
      memory: 4g
      disk: 10g
  recording:
    enabled: true
    captureBrowser: true
    captureTerminal: true
    fps: 30
    quality: high

examples:
  - title: Quick Start
    code: |
      import { runCloudAegnt } from '@aegntic/cldcde-cloud-aegnts';

      const result = await runCloudAegnt('Build a REST API', {
        repo: 'https://github.com/owner/repo',
        createPR: true
      });

      console.log('Video:', result.videoUrl);

  - title: Multi-Aegnt Parallel
    code: |
      import { CloudAegntOrchestrator } from '@aegntic/cldcde-cloud-aegnts';

      const orchestrator = new CloudAegntOrchestrator();

      await orchestrator.runParallel([
        'Build frontend',
        'Build backend',
        'Write tests'
      ]);

documentation:
  readme: README.md
  examples: examples/
  api: docs/api.md

links:
  homepage: https://github.com/aegntic/cldcde/tree/main/plugins/cloud-agents
  issues: https://github.com/aegntic/cldcde/issues
  npm: https://npm.im/@aegntic/cldcde-cloud-aegnts
  cursor: https://cursor.com/blog/agent-computer-use
  aegntic: https://aegntic.ai


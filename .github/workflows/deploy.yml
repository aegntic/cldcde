name: Deploy CLDCDE Ecosystem

on:
  push:
    branches: [ main, develop ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  # Deploy to GitHub Pages (Frontend)
  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.ref == "refs/heads/main" || startsWith(github.ref, "refs/tags/")
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: \${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: |
          cd website
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: website/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

  # Create Release
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, "refs/tags/")
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: \${{ github.ref_name }}
          name: CLDCDE \${{ github.ref_name }}
          body: |
            ## 🚀 CLDCDE \${{ github.ref_name }} Release

            **Creator Live Development & Content Distribution Ecosystem**

            ### ✨ What's New
            - CLDCDE.cc branding across all tools
            - Enhanced MCP server integrations
            - Updated ae.ltd attribution

            ### 📦 Available Tools
            - YouTube Creator Pro & Basic
            - OBS Studio Control
            - Aegntic MCP Server
            - AI Memory Server
            - Context7 MCP
            + More

            ### 🌐 Links
            - **Website**: https://cldcde.cc
            - **GitHub**: https://github.com/aegntic/cldcde

            ---

            **Developed by [ae.ltd](https://ae.ltd)**
            Powered by AEGNTIC AI Ecosystems
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLDCDE.CC - Google Labs x Compound Engineering</title>
  <meta name="description" content="CLDCDE.CC is the AE.LTD creative engineering surface for Google Labs workflows, compound quality gates, MCP servers, and viral-ready skill packs.">
  <meta name="keywords" content="google labs, compound engineering, cldcde, ae.ltd, mcp, agent workflows, skill packs">
  <meta name="author" content="cldcde.cc">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cldcde.cc/">
  <meta property="og:title" content="CLDCDE.CC - Google Labs x Compound Engineering">
  <meta property="og:description" content="Build in Labs mode and ship through compound quality gates on CLDCDE.CC.">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://cldcde.cc/">
  <meta property="twitter:title" content="CLDCDE.CC - Google Labs x Compound Engineering">
  <meta property="twitter:description" content="AE.LTD platform for Google Labs workflows, MCP integrations, and compound engineering gates.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Minimal loading styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Space Grotesk', 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #070f16;
      background-image:
        radial-gradient(circle at 14% -18%, rgba(15, 211, 159, 0.2) 0%, transparent 44%),
        radial-gradient(circle at 88% -20%, rgba(0, 168, 255, 0.2) 0%, transparent 42%),
        linear-gradient(180deg, #070f16 0%, #0e1823 100%);
      color: #e8f4ff;
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loading animation */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, #070f16 0%, #0e1823 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(37, 54, 74, 0.9);
      border-top: 3px solid #00a8ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      color: #4ec5ff;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Labs Surface...</div>
      </div>
    </div>
  </div>
  
  <script type="module" src="./index.tsx"></script>
</body>
</html>
